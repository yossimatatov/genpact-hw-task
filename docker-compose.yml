services:
  university-qa:
    build:
      context: .
      dockerfile: Dockerfile
    image: university-qa-agent:latest
    container_name: university-qa-agent
    ports:
      - "8501:8501"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: /app/data/university.db
      SCHEMA_PATH: /app/db/schema.sql
      SEED_PATH: /app/db/seed.sql
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-2}
      SQL_MAX_RETRIES: ${SQL_MAX_RETRIES:-3}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-genpact-hw-task}
      LANGSMITH_RUN_NAME: ${LANGSMITH_RUN_NAME:-University QA LangGraph}
      LANGSMITH_TAGS: ${LANGSMITH_TAGS:-streamlit,langgraph,university-qa}
    volumes:
      - university_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  tests:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile
    image: university-qa-agent:latest
    environment:
      LANGSMITH_TRACING: "false"
      LANGCHAIN_TRACING_V2: "false"
      LANGSMITH_API_KEY: ""
    command: python -m pytest -q

volumes:
  university_data:
